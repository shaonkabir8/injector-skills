name: Sync SKILL.md and rules

on:
  push:
    branches: [main]
    paths:
      - skills/injector-skills/SKILL.md
      - skills/cavecrew/SKILL.md
      - agents/cavecrew-*.md
      - skills/injector-skills-compress/SKILL.md
      - skills/injector-skills-compress/scripts/**

concurrency:
  group: sync-skill
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest before making changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Sync SKILL.md copies
        run: |
          cp skills/injector-skills/SKILL.md plugins/injector-skills/skills/injector-skills/SKILL.md

      - name: Sync injector-skills-compress skill to plugin
        run: |
          # Plugin distribution mirrors source verbatim — no rename, no sed.
          mkdir -p plugins/injector-skills/skills/injector-skills-compress
          cp skills/injector-skills-compress/SKILL.md plugins/injector-skills/skills/injector-skills-compress/SKILL.md
          rm -rf plugins/injector-skills/skills/injector-skills-compress/scripts
          cp -r skills/injector-skills-compress/scripts plugins/injector-skills/skills/injector-skills-compress/scripts
          rm -rf plugins/injector-skills/skills/injector-skills-compress/scripts/__pycache__

      - name: Sync cavecrew skill + agents to plugin
        run: |
          mkdir -p plugins/injector-skills/skills/cavecrew plugins/injector-skills/agents
          cp skills/cavecrew/SKILL.md plugins/injector-skills/skills/cavecrew/SKILL.md
          cp agents/cavecrew-investigator.md plugins/injector-skills/agents/cavecrew-investigator.md
          cp agents/cavecrew-builder.md plugins/injector-skills/agents/cavecrew-builder.md
          cp agents/cavecrew-reviewer.md plugins/injector-skills/agents/cavecrew-reviewer.md

      - name: Rebuild injector-skills.skill ZIP
        run: mkdir -p dist && cd skills && zip -r ../dist/injector-skills.skill injector-skills/

      - name: Commit and push if changed
        run: |
          git add \
            skills/injector-skills-compress/ \
            plugins/injector-skills/skills/injector-skills-compress/ \
            plugins/injector-skills/skills/injector-skills/SKILL.md \
            plugins/injector-skills/skills/cavecrew/SKILL.md \
            plugins/injector-skills/agents/cavecrew-investigator.md \
            plugins/injector-skills/agents/cavecrew-builder.md \
            plugins/injector-skills/agents/cavecrew-reviewer.md \
            dist/injector-skills.skill
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync SKILL.md copies [skip ci]"
          git push
